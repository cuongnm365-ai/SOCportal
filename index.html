<!DOCTYPE html>
<html lang="vi">
<head>
    <!-- GTM Tracking -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-WN4FFVFN');</script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Command Center - Cloud AI</title>
    
    <!-- Thư viện giao diện Tailwind & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Gọi file Giao diện từ thư mục CSS -->
    <link rel="stylesheet" href="CSS/style.css">

    <!-- THÊM THƯ VIỆN GOOGLE IDENTITY -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="overflow-x-hidden bg-[#f1f5f9] text-[#334155] font-sans">
    <!-- GTM (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WN4FFVFN" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    
    <!-- MÀN HÌNH ĐĂNG NHẬP -->
    <div id="login-screen" class="fixed inset-0 bg-slate-900 z-[100] flex flex-col items-center justify-center bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-800 to-slate-950">
        <div class="bg-white p-10 rounded-2xl shadow-2xl flex flex-col items-center max-w-md w-full mx-4 border border-slate-200">
            <div class="h-16 w-16 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-200 mb-6" style="background: linear-gradient(135deg, #a78bfa, #818cf8);">
                <i class="fa-solid fa-microchip text-white text-3xl"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-800 tracking-wide text-center mb-2">SOC COMMAND</h1>
            <p class="text-sm text-slate-500 font-medium text-center mb-8">Hệ thống nội bộ. Vui lòng đăng nhập bằng tài khoản Google để tiếp tục.</p>
            
            <!-- Nút Đăng nhập Google sẽ được render vào đây -->
            <div id="g_id_onload"
                 data-client_id="ĐIỀN_CLIENT_ID_CỦA_BẠN_VÀO_ĐÂY.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
        </div>
        <p class="text-slate-500 text-xs mt-6">© 2026 FPT Telecom - Service Operation Center</p>
    </div>

    <!-- KHU VỰC APP CHÍNH (BỊ ẨN MẶC ĐỊNH BỞI CLASS 'hidden') -->
    <div id="app-container" class="flex h-screen overflow-hidden hidden">
        
        <!-- SIDEBAR GIAO DIỆN CHÍNH -->
        <aside class="w-72 border-r border-white/60 flex-col hidden md:flex shadow-[4px_0_24px_rgba(148,163,184,0.1)]" style="background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(16px);">
            <div class="p-6 border-b border-slate-200/50 flex items-center gap-3 justify-between">
                <div class="flex items-center gap-3">
                    <div class="h-10 w-10 rounded-xl flex items-center justify-center shadow-md shadow-indigo-200" style="background: linear-gradient(135deg, #a78bfa, #818cf8);">
                        <i class="fa-solid fa-microchip text-white text-sm"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-slate-800 tracking-wide text-lg">SOC COMMAND</h1>
                        <p class="text-[11px] text-indigo-500 font-bold uppercase tracking-wider">Cloud Pastel AI</p>
                    </div>
                </div>
            </div>
            <!-- Hiển thị người dùng -->
            <div class="px-6 py-4 border-b border-slate-200/50 bg-indigo-50/50 flex items-center gap-3">
                <img id="user-avatar" src="" alt="Avatar" class="w-8 h-8 rounded-full border border-indigo-200 hidden">
                <div class="flex-1 overflow-hidden">
                    <p id="user-name" class="text-xs font-bold text-slate-700 truncate">Chưa đăng nhập</p>
                    <p id="user-email" class="text-[10px] text-slate-500 truncate">...</p>
                </div>
            </div>

            <nav class="p-4 space-y-2 mt-2 flex flex-col gap-1">
                <!-- Nút Hệ Thống Vận Hành -->
                <button id="navMainBtn" class="w-full text-left px-4 py-3 rounded-lg text-sm font-bold text-indigo-700 shadow-sm transition-all" style="background: linear-gradient(90deg, rgba(167, 139, 250, 0.15), transparent); border-left: 4px solid #a78bfa;">
                    <i class="fa-solid fa-wand-magic-sparkles w-5"></i> Hệ Thống Vận Hành
                </button>
                <!-- Nút Cài Đặt Hệ Thống -->
                <button id="navSettingsBtn" class="w-full text-left px-4 py-3 rounded-lg text-sm font-bold text-slate-500 hover:bg-slate-100 hover:text-slate-700 border-l-4 border-transparent transition-all">
                    <i class="fa-solid fa-gear w-5"></i> Cài Đặt Hệ Thống
                </button>
                <!-- Đăng xuất -->
                <button id="btnLogout" class="w-full mt-4 text-left px-4 py-3 rounded-lg text-sm font-bold text-red-500 hover:bg-red-50 hover:text-red-600 border-l-4 border-transparent transition-all">
                    <i class="fa-solid fa-right-from-bracket w-5"></i> Đăng xuất
                </button>
            </nav>
        </aside>

        <!-- KHU VỰC LÀM VIỆC CHÍNH (Giữ nguyên phần nội dung bên phải như cũ) -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- [TOÀN BỘ CODE <header> VÀ <main> CỦA BẠN GIỮ NGUYÊN NHƯ BẢN TRƯỚC ĐÓ] -->
            <!-- ... -->
        </div>
    </div>

    <!-- SCRIPT VÀ TEMPLATE -->
    <script src="JS/engine.js"></script>
    <!-- ... -->
</body>
</html>
